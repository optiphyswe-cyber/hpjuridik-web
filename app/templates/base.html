<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% if seo and seo.title %}{{ seo.title }}{% else %}HP Juridik{% endif %}</title>
  <meta name="description" content="{% if seo and seo.description %}{{ seo.description }}{% else %}HP Juridik{% endif %}">
  <link rel="canonical" href="{% if seo and seo.canonical %}{{ seo.canonical }}{% else %}https://hpjuridik.se/{% endif %}">
  <meta name="robots" content="{% if seo and seo.robots %}{{ seo.robots }}{% else %}index,follow{% endif %}">

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="container header-wrap">
      <div class="brand">
        <a href="/" class="brand-link">HP Juridik</a>
      </div>

      <nav class="nav">
        <a href="/kontakta-oss">Kontakt</a>
        <a href="/#om-oss">Om oss</a>
        <a href="/#tjanster">Tjänster</a>
        <a href="/#cases">Cases</a>
        <a href="/lana-bil-till-skuldsatt">Låna bil (avtal)</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <div class="container">
      <div class="muted">
        <strong>{{ company.brand }}</strong><br>
        📞 <a href="tel:0763171284">076-317 12 84</a> ·
        ✉ <a href="mailto:hp@hpjuridik.se">hp@hpjuridik.se</a><br>
        🌐 <a href="https://hpjuridik.se" target="_blank">hpjuridik.se</a><br>
        📍 {{ company.address }}<br>
        🏢 {{ company.company }} · Org.nr: {{ company.orgnr }}
      </div>
    </div>
  </footer>
</body>
</html>
