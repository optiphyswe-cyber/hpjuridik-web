<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% if seo and seo.title %}{{ seo.title }}{% else %}HP Juridik{% endif %}</title>
  <meta name="description" content="{% if seo and seo.description %}{{ seo.description }}{% else %}HP Juridik{% endif %}">
  <link rel="canonical" href="{% if seo and seo.canonical %}{{ seo.canonical }}{% else %}https://hpjuridik.se/{% endif %}">
  <meta name="robots" content="{% if seo and seo.robots %}{{ seo.robots }}{% else %}index,follow{% endif %}">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3CXX8HFFKM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3CXX8HFFKM');
  </script>

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

<a href="tel:0763171284" class="sticky-call" aria-label="Ring HP Juridik">
  <span class="sticky-ic">
    <img src="{{ url_for('static', path='head-phonecall.png') }}" alt="">
  </span>

  <span class="sticky-text">
    <span class="sticky-title">Ring nu</span>
    <span class="sticky-sub">Få en tydlig plan på 20 min</span>
  </span>

  <span class="sticky-go" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</a>
<body>
  <!-- HEADER: centrerad logga + en meny -->
  <header class="site-header">
    <div class="container header-stack">

      <div class="brand-center">
        <a href="/" class="brand-logo" aria-label="HP Juridik">
          <img
            src="{{ url_for('static', path='hp-juridik-logo.png') }}"
            alt="HP Juridik"
            class="logo-img"
          />
        </a>
      </div>

      <nav class="nav nav-center">
        <a href="/kontakta-oss">Kontakt</a>
        <a href="/#om-oss">Om oss</a>
        <a href="/#tjanster">Tjänster</a>
        <a href="/#cases">Cases</a>
        <a href="/lana-bil-till-skuldsatt">Låna bil (avtal)</a>
      </nav>

    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <div class="container">
      <div class="muted">
        <strong>{{ company.brand }}</strong><br>
        📞 <a href="tel:0763171284">076-317 12 84</a> ·
        ✉ <a href="mailto:hp@hpjuridik.se">hp@hpjuridik.se</a><br>
        🌐 <a href="https://hpjuridik.se" target="_blank">hpjuridik.se</a><br>
        📍 {{ company.address }}<br>
        🏢 {{ company.company }} · Org.nr: {{ company.orgnr }}
      </div>
    </div>
  </footer>
</body>
</html>
