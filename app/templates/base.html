<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- TITLE -->
  <title>
    {% if seo and seo.title %}
      {{ seo.title }}
    {% else %}
      HP Juridik | Juridisk rådgivning i Lund & Skåne
    {% endif %}
  </title>

  <!-- DESCRIPTION -->
  <meta name="description"
        content="{% if seo and seo.description %}{{ seo.description }}{% else %}Personlig och trygg juridisk rådgivning i Lund och Skåne. 20 min gratis första bedömning.{% endif %}" />

  <!-- CANONICAL (FIXAR DUPLICATE-PROBLEMET) -->
  <link rel="canonical"
        href="{% if seo and seo.canonical %}{{ seo.canonical }}{% else %}https://www.hpjuridik.se/{% endif %}" />

  <!-- ROBOTS -->
  <meta name="robots"
        content="{% if seo and seo.robots %}{{ seo.robots }}{% else %}index, follow{% endif %}" />

  <!-- Open Graph -->
  <meta property="og:title"
        content="{% if seo and seo.title %}{{ seo.title }}{% else %}HP Juridik | Juridisk rådgivning i Lund & Skåne{% endif %}" />
  <meta property="og:description"
        content="{% if seo and seo.description %}{{ seo.description }}{% else %}Personlig och trygg juridisk rådgivning i Lund och Skåne.{% endif %}" />
  <meta property="og:url"
        content="{% if seo and seo.canonical %}{{ seo.canonical }}{% else %}https://www.hpjuridik.se/{% endif %}" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  {% include "partials/header.html" %}

  <!-- LOGGA under menyn (centrerad) -->
  <div class="logo-banner">
    <img src="/static/hp-juridik-logo.png" alt="HP Juridik" class="main-logo" loading="eager">
  </div>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <!-- Cookie banner -->
  <div id="cookieBanner" class="cookie-banner" role="dialog" aria-live="polite" aria-label="Cookie-meddelande">
    <div class="cookie-card">
      <div class="cookie-text">
        <div class="cookie-title">Cookies</div>
        <p class="cookie-muted">
          Vi använder nödvändiga cookies för att webbplatsen ska fungera. Med ditt samtycke kan vi även använda cookies för statistik.
          Läs mer i vår <a href="/gdpr">integritetspolicy</a>.
        </p>
      </div>

      <div class="cookie-actions">
        <button type="button" class="cookie-btn cookie-btn-ghost" id="cookieDecline">Avböj</button>
        <button type="button" class="cookie-btn cookie-btn-primary" id="cookieAccept">Acceptera</button>
      </div>
    </div>
  </div>

  <!-- Cookie JS -->
  <script>
  (function () {
    const KEY = "hp_cookie_consent_v1"; // accepted | declined
    const banner = document.getElementById("cookieBanner");
    const acceptBtn = document.getElementById("cookieAccept");
    const declineBtn = document.getElementById("cookieDecline");

    if (!banner || !acceptBtn || !declineBtn) return;

    const saved = localStorage.getItem(KEY);
    if (!saved) banner.classList.add("is-visible");

    function setConsent(value) {
      localStorage.setItem(KEY, value);
      banner.classList.remove("is-visible");
    }

    acceptBtn.addEventListener("click", function () { setConsent("accepted"); });
    declineBtn.addEventListener("click", function () { setConsent("declined"); });
  })();
  </script>
</body>
</html>
