<style>
/* ============================= */
/* Desktop Sticky Call Widget   */
/* ============================= */

.call-widget-desktop {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 9999;

  display: none;
  align-items: center;
  gap: 14px;

  width: 420px;
  max-width: calc(100vw - 40px);

  padding: 14px 16px;
  border-radius: 20px;

  background: #0f1b2d;
  color: #fff;
  text-decoration: none;

  box-shadow: 0 18px 50px rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.08);

  transition: transform .15s ease, opacity .2s ease;
}

.call-widget-desktop:hover {
  transform: translateY(-2px);
}

.call-avatar {
  width: 50px;
  height: 50px;
  border-radius: 999px;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}

.call-text {
  flex: 1;
}

.call-title {
  font-weight: 800;
  font-size: 16px;
  line-height: 1.1;
}

.call-sub {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 4px;
}

.call-button {
  background: #2f8f5b;
  padding: 10px 16px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 14px;
  white-space: nowrap;
}

/* Visa endast på desktop */
@media (min-width: 980px) {
  .call-widget-desktop {
    display: flex;
  }
}
</style>


<script>
/* Visa först efter lite scroll */
document.addEventListener("DOMContentLoaded", function() {
  const widget = document.querySelector(".call-widget-desktop");
  if (!widget) return;

  widget.style.opacity = "0";
  widget.style.pointerEvents = "none";

  const showAfter = 200;

  window.addEventListener("scroll", function() {
    if (window.scrollY > showAfter) {
      widget.style.opacity = "1";
      widget.style.pointerEvents = "auto";
    } else {
      widget.style.opacity = "0";
      widget.style.pointerEvents = "none";
    }
  });
});
</script>
